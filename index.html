<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Knitting Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Knitting Translator</h2>

  <textarea id="input" placeholder="Englische Strickanweisungen..."></textarea>

  <div class="buttons">
    <button onclick="translateText()">Übersetzen</button>
    <button onclick="copyText()">Kopieren</button>
    <button onclick="clearAll()">Löschen</button>
  </div>

  <textarea id="output" placeholder="Deutsche Übersetzung..." readonly></textarea>

  <script src="script.js"></script>
</body>
</html>
